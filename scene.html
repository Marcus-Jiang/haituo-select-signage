<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>使用场景 - カイタク選品</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

    <link rel="stylesheet" href="css/styles.css" />
</head>
<body class="scene-page">
    <header class="top-bar">
        <div class="top-bar-inner">
            <div class="flex items-center gap-3 flex-1 min-w-0">
                <button id="scene-back-btn" class="flex items-center gap-2 text-sm font-medium transition-all duration-200 cursor-pointer"
                    style="color: rgba(255,255,255,0.7); background: none; border: none; padding: 6px 12px; border-radius: 8px;"
                    onmouseover="this.style.backgroundColor='rgba(255,255,255,0.08)';this.style.color='rgba(255,255,255,0.95)';"
                    onmouseout="this.style.backgroundColor='transparent';this.style.color='rgba(255,255,255,0.7)';">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
                    </svg>
                    <span id="scene-back-text">返回</span>
                </button>
                <h1 id="scene-product-title" class="text-base font-medium tracking-wider truncate" style="color: rgba(255,255,255,0.95);">
                    使用场景
                </h1>
            </div>
            <div class="flex items-center gap-2 shrink-0">
                <button id="scene-btn-jp" class="lang-btn text-xs font-medium px-3 py-1.5 rounded-md border transition-all duration-200"
                    style="background-color: var(--primary-color); color: white; border-color: var(--primary-color);">日本語</button>
                <button id="scene-btn-cn" class="lang-btn text-xs font-medium px-3 py-1.5 rounded-md border transition-all duration-200"
                    style="background-color: transparent; color: rgba(255,255,255,0.5); border-color: rgba(255,255,255,0.12);">中文</button>
            </div>
        </div>
    </header>

    <div id="scene-empty-state" class="scene-empty-state hidden">
        <div class="scene-empty-content">
            <svg class="w-20 h-20 mb-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" style="opacity: 0.3; color: var(--text-muted);">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/>
            </svg>
            <p id="scene-empty-title" class="text-lg font-medium mb-2" style="color: var(--text-primary);">暂无场景图片</p>
            <p id="scene-empty-desc" class="text-sm mb-8" style="color: var(--text-muted);">该产品尚未配置使用场景图片，请在管理后台中添加。</p>
            <button id="scene-empty-back-btn" class="flex items-center gap-2 px-6 py-2.5 rounded-lg text-sm font-medium transition-all duration-200 cursor-pointer"
                style="background: linear-gradient(135deg, #4A6FA5 0%, var(--primary-dark) 100%); color: white; border: none;">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
                </svg>
                <span id="scene-empty-back-text">返回产品列表</span>
            </button>
        </div>
    </div>

    <div id="scene-slideshow" class="scene-slideshow-container">
        <div class="scene-image-wrapper">
            <img id="scene-main-image" src="" alt="" />
        </div>
        <div class="scene-info-bar">
            <span id="scene-counter"></span>
        </div>
    </div>

    <button id="scene-prev-btn" class="scene-nav-btn scene-nav-prev hidden" onclick="ScenePage.prev()">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
        </svg>
    </button>
    <button id="scene-next-btn" class="scene-nav-btn scene-nav-next hidden" onclick="ScenePage.next()">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
        </svg>
    </button>

    <script src="js/api.js"></script>
    <script src="js/i18n.js"></script>
    <script src="js/scene.js"></script>
</body>
</html>
