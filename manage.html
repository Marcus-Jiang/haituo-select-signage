<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>海拓选品 - 管理后台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="css/styles.css" />
    <link rel="stylesheet" href="css/manage.css" />
</head>
<body>
    <div id="app" class="flex h-screen overflow-hidden">
        <aside id="sidebar" class="sidebar">
            <div class="sidebar-header">
                <div class="flex items-center gap-2.5">
                    <svg class="w-5 h-5 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="color: var(--accent-gold);">
                        <rect x="2" y="3" width="20" height="14" rx="2" />
                        <path d="M8 21h8" />
                        <path d="M12 17v4" />
                    </svg>
                    <h1 class="text-sm font-semibold tracking-wider" style="color: rgba(255,255,255,0.95);">海拓选品管理</h1>
                </div>
            </div>
            <div class="sidebar-body" id="category-tree"></div>
            <div class="sidebar-footer" id="sidebar-footer">
                <button class="btn-add-cat" onclick="ManageApp.addCategory()">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
                    添加一级分类
                </button>
            </div>
        </aside>

        <main class="main-content">
            <header class="main-header">
                <div id="breadcrumb" class="breadcrumb"></div>
                <div id="header-actions" class="header-actions"></div>
            </header>
            <div class="main-body" id="main-body">
                <div class="empty-state">
                    <svg class="w-16 h-16 mx-auto mb-4" style="color: var(--border-color)" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M4 6h16M4 10h16M4 14h16M4 18h16"/></svg>
                    <p class="text-base font-medium" style="color: var(--text-muted)">请从左侧选择分类</p>
                    <p class="text-sm mt-1" style="color: var(--text-muted)">选择一级分类管理子分类，选择子分类管理品类</p>
                </div>
            </div>
        </main>
    </div>

    <div id="modal-overlay" class="modal-overlay hidden">
        <div id="modal" class="modal">
            <div class="modal-header">
                <h3 id="modal-title" class="modal-title"></h3>
                <button class="modal-close" onclick="ManageApp.closeModal()">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                </button>
            </div>
            <div id="modal-body" class="modal-body"></div>
            <div id="modal-footer" class="modal-footer"></div>
        </div>
    </div>

    <div id="confirm-overlay" class="modal-overlay hidden">
        <div class="modal" style="max-width: 420px;">
            <div class="modal-header">
                <h3 class="modal-title">确认操作</h3>
                <button class="modal-close" onclick="ManageApp.closeConfirm()">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                </button>
            </div>
            <div class="modal-body">
                <p id="confirm-message" class="text-sm" style="color: var(--text-secondary)"></p>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="ManageApp.closeConfirm()">取消</button>
                <button class="btn btn-danger" id="confirm-btn" onclick="ManageApp.doConfirm()">确认删除</button>
            </div>
        </div>
    </div>

    <div id="toast" class="toast hidden">
        <div class="flex items-center gap-2.5">
            <span id="toast-icon"></span>
            <span id="toast-message"></span>
        </div>
    </div>

    <script src="js/utils.js"></script>
    <script src="js/manage.js"></script>
</body>
</html>
